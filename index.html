<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imani Sterling</title>
    <meta property="og:title" content="Access is not a right.">
    <meta property="og:description" content="It's a response.">
    <meta property="og:image" content="https://imani-landing.vercel.app/background.jpg">
    <meta property="og:url" content="https://imani-landing.vercel.app">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Access is not a right.">
    <meta name="twitter:description" content="It's a response.">
    <meta name="twitter:image" content="https://imani-landing.vercel.app/background.jpg">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text y='.9em' font-size='90' fill='%23c9a84c'>I</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0a0a0a; --text: white; --accent: #c9a84c; }
        html, body { height: 100%; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cormorant Garamond', 'Palatino Linotype', Georgia, serif;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
            position: relative;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        body.visible { opacity: 1; }
        #sound-toggle {
            position: fixed;
            top: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 500;
            cursor: pointer;
            color: var(--accent);
            opacity: 0.3;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: none;
            border: none;
        }
        #sound-toggle.active { opacity: 0.7; }
        #return-timer {
            display: none;
            position: fixed;
            top: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 0.9rem;
            color: #c9a84c;
            opacity: 0.6;
            letter-spacing: 0.15em;
            z-index: 500;
            pointer-events: none;
        }
        #browser-banner {
            display: none;
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 0.5rem;
            text-align: center;
            font-size: 0.6rem;
            color: white;
            opacity: 0.4;
            letter-spacing: 0.1em;
            background: transparent;
            z-index: 1000;
            cursor: pointer;
        }
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./background.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            z-index: -1;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        #bg.loaded { opacity: 1; }
        @media (max-width: 768px) {
            #bg {
                background-attachment: scroll;
                background-position: center top;
            }
        }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.78);
            z-index: 0;
            pointer-events: none;
        }
        #cursor {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 8px rgba(201,168,76,0.35);
            display: none;
        }
        #cursor.expanded { width: 22px; height: 22px; }
        @media (pointer: fine) { #cursor { display: block; } }
        .step {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            pointer-events: none;
            z-index: 100;
        }
        .step.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .step.slide-up { transform: translateY(-30px); opacity: 0; }
        h1, .question, .response-text {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-align: center;
            letter-spacing: 0.05em;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        .sub-text { font-size: 0.85rem; opacity: 0.65; margin-bottom: 1.5rem; }
        .sub-text.visible { opacity: 0.65; }
        .hesitation-text { font-size: 0.75rem; font-style: italic; opacity: 0; margin-top: 1.5rem; transition: opacity 0.8s ease; }
        .hesitation-text.visible { opacity: 0.5; }
        .extra-text { font-size: 0.8rem; opacity: 0; margin-top: 1rem; transition: opacity 0.8s ease; }
        .extra-text.visible { opacity: 0.6; }
        .links { display: flex; flex-direction: column; align-items: center; gap: 1.4rem; margin-top: 1rem; }
        .links a {
            color: var(--text);
            text-decoration: none;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
            opacity: 0;
            display: block;
            margin: 1.4rem auto;
            text-align: center;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .links a.visible { opacity: 1; }
        .links a:hover { text-decoration: underline; text-decoration-color: var(--accent); text-decoration-thickness: 1px; }
        .try-again-link {
            cursor: pointer;
            color: white;
            opacity: 0.5;
            font-size: 0.78rem;
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            pointer-events: auto;
            z-index: 200;
            letter-spacing: 0.12em;
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: none;
            border: none;
            text-decoration: none;
        }
        .try-again-link:hover { opacity: 0.8; }
        button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: var(--text);
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            font-weight: 300;
            padding: 1rem 2rem;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            margin: 0.8rem auto;
            opacity: 0;
            width: min(320px, 85vw);
            min-height: 56px;
            display: block;
            position: relative;
            z-index: 150;
            pointer-events: auto;
            cursor: pointer;
        }
        button.visible { opacity: 1; }
        button:hover { background: rgba(255,255,255,0.06); border-color: white; }
        button.correct-flash { box-shadow: 0 0 20px rgba(201,168,76,0.6); border-color: #c9a84c; }
        .options { display: flex; flex-direction: column; gap: 0.8rem; align-items: center; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <button id="sound-toggle">sound</button>
    <div id="return-timer"></div>
    <div id="bg"></div>
    <div id="cursor"></div>
    <div id="browser-banner">For best experience, open in Safari or Chrome</div>
    <div id="step1" class="step active">
        <h1 id="step1-text"></h1>
        <button id="step1-btn" onclick="nextStep(1)">I'm ready.</button>
    </div>
    <div id="step2" class="step">
        <p class="question" id="step2-text"></p>
        <div class="options">
            <button onclick="selectOption(1, 2)" class="step2-btn">I recognize value when I see it.</button>
            <button onclick="selectOption(2, 2)" class="step2-btn">I need to understand first.</button>
            <button onclick="selectOption(3, 2)" class="step2-btn">I'm just curious.</button>
        </div>
        <p class="hesitation-text" id="hesitation-step2">Most people who hesitate here don't come back.</p>
    </div>
    <div id="step2-end" class="step">
        <p class="response-text" id="step2-end-text"></p>
        <p class="extra-text" id="step2-end-extra">Access closes in 24 hours.</p>
        <button class="try-again-link" onclick="restart()">Try again.</button>
    </div>
    <div id="step3" class="step">
        <p class="question" id="step3-text"></p>
        <div class="options">
            <button onclick="selectOption(1, 3)" class="step3-btn">My attention.</button>
            <button onclick="selectOption(2, 3)" class="step3-btn">My time.</button>
            <button onclick="selectOption(3, 3)" class="step3-btn">My resources.</button>
        </div>
        <p class="hesitation-text" id="hesitation-step3">Most people who hesitate here don't come back.</p>
    </div>
    <div id="step3-end" class="step">
        <p class="response-text" id="step3-end-text"></p>
        <p class="extra-text" id="step3-end-extra">Those who understand value don't hesitate.</p>
        <button class="try-again-link" onclick="restart()">Try again.</button>
    </div>
    <div id="step-final" class="step">
        <p class="response-text" id="final-access"></p>
        <p class="sub-text visible" id="final-sub">You're one of few.</p>
        <div class="links">
            <a href="https://instagram.com/this.imani" target="_blank" class="final-link">Instagram</a>
            <a href="https://x.com/this_imani_" target="_blank" class="final-link">X</a>
            <a href="https://www.fanvue.com/this.imani" target="_blank" class="final-link" id="fanvue-link">Claim your access →</a>
        </div>
    </div>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            var bg = document.getElementById('bg');
            var cursor = document.getElementById('cursor');
            var soundToggle = document.getElementById('sound-toggle');
            var returnTimer = document.getElementById('return-timer');
            var browserBanner = document.getElementById('browser-banner');
            var exitIntentTriggered = false;
            var hesitationTimer = null;
            var audioCtx = null;
            var soundEnabled = false;
            var clickInitialized = false;
            var isReturningVisitor = localStorage.getItem('imani_visited') ? true : false;

            // Check for in-app browser
            var isInAppBrowser = /Instagram|FBAN|FBAV/.test(navigator.userAgent);
            if (isInAppBrowser) {
                browserBanner.style.display = 'block';
                browserBanner.addEventListener('click', function() {
                    browserBanner.style.display = 'none';
                });
            }

            function va(eventName, value) {
                if (window.va) {
                    if (value !== undefined) {
                        window.va('event', { name: eventName, value: value });
                    } else {
                        window.va('event', { name: eventName });
                    }
                }
            }

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            function playTick() {
                if (!soundEnabled || !audioCtx) return;
                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 600;
                gain.gain.setValueAtTime(0.025, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.04);
            }

            soundToggle.addEventListener('click', function() {
                initAudio();
                soundEnabled = !soundEnabled;
                soundToggle.textContent = soundEnabled ? 'sound ●' : 'sound';
                soundToggle.classList.toggle('active', soundEnabled);
            });

            function haptic(type) {
                if (navigator.vibrate) {
                    if (type === 'wrong') navigator.vibrate(300);
                    else navigator.vibrate([80, 40, 80]);
                }
            }

            function typeText(element, text, speed, callback) {
                element.textContent = '';
                var i = 0;
                function type() {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        playTick();
                        i++;
                        setTimeout(type, speed);
                    } else if (callback) setTimeout(callback, speed);
                }
                type();
            }

            function showButton(btn, delay) {
                setTimeout(function() { btn.classList.add('visible'); }, delay);
            }

            function fadeIn(el, delay) {
                setTimeout(function() { el.classList.add('visible'); }, delay);
            }

            function showExitIntent() {
                if (exitIntentTriggered) return;
                exitIntentTriggered = true;
            }

            // RETURNING VISITOR COUNTDOWN
            function startReturnCountdown() {
                var seconds = 30;
                returnTimer.style.display = 'block';
                returnTimer.textContent = '0:30';
                var interval = setInterval(function() {
                    seconds--;
                    var secs = seconds % 60;
                    returnTimer.textContent = '0:' + (secs < 10 ? '0' : '') + secs;
                    if (seconds <= 0) {
                        clearInterval(interval);
                        window.location.href = '/closed.html';
                    }
                }, 1000);
                window.returnCountdownInterval = interval;
            }

            function stopReturnCountdown() {
                if (window.returnCountdownInterval) {
                    clearInterval(window.returnCountdownInterval);
                }
                returnTimer.style.display = 'none';
            }

            // HESITATION TIMER
            function startHesitationTimer() {
                if (hesitationTimer) {
                    clearTimeout(hesitationTimer);
                    hesitationTimer = null;
                }
                console.log('HESITATION TIMER STARTED for step');
                
                // Find current step number
                var stepNum = 2;
                if (document.getElementById('step3').classList.contains('active')) {
                    stepNum = 3;
                }
                
                var el = document.getElementById('hesitation-step' + stepNum);
                if (!el) {
                    console.log('No hesitation element found for step ' + stepNum);
                    return;
                }
                
                hesitationTimer = setTimeout(function() {
                    console.log('HESITATION TRIGGERED for step ' + stepNum);
                    if (el) {
                        el.classList.add('visible');
                        setTimeout(function() { 
                            if (el) el.classList.remove('visible'); 
                        }, 3000);
                    }
                }, 8000);
            }

            function cancelHesitationTimer() {
                if (hesitationTimer) {
                    clearTimeout(hesitationTimer);
                    hesitationTimer = null;
                    console.log('HESITATION TIMER CANCELLED');
                }
            }

            function restart() {
                sessionStorage.removeItem('imani_access');
                location.reload();
            }

            // Start background fade immediately
            bg.classList.add('loaded');
            document.body.classList.add('visible');

            // Click tracking
            document.addEventListener('click', function init() {
                if (!clickInitialized) {
                    clickInitialized = true;
                    localStorage.setItem('step1_time', Date.now());
                }
            });

            history.pushState(null, null, window.location.href);
            window.addEventListener('popstate', function() { history.pushState(null, null, window.location.href); });

            if (sessionStorage.getItem('imani_access') === 'granted') {
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step-final').classList.add('active');
                document.getElementById('final-access').classList.add('visible');
                setTimeout(function() { document.getElementById('final-sub').classList.add('visible'); }, 1000);
                document.querySelectorAll('.final-link').forEach(function(el, i) {
                    setTimeout(function() { el.classList.add('visible'); }, 1800 + i * 600);
                });
                document.querySelector('#fanvue-link').onclick = function() { va('fanvue_clicked'); };
            } else {
                if (isReturningVisitor) {
                    startReturnCountdown();
                }

                if (window.matchMedia('(pointer: fine)').matches) {
                    document.addEventListener('mousemove', function(e) {
                        cursor.style.left = e.clientX + 'px';
                        cursor.style.top = e.clientY + 'px';
                    });
                    document.querySelectorAll('button, .links a, .try-again-link').forEach(function(el) {
                        el.addEventListener('mouseenter', function() { cursor.classList.add('expanded'); });
                        el.addEventListener('mouseleave', function() { cursor.classList.remove('expanded'); });
                    });
                }

                document.addEventListener('mouseleave', function(e) {
                    if (e.clientY <= 0) showExitIntent();
                });

                var touchStartY = 0;
                document.addEventListener('touchstart', function(e) { touchStartY = e.touches[0].clientY; });
                document.addEventListener('touchmove', function(e) {
                    if (touchStartY - e.touches[0].clientY > 50) showExitIntent();
                });

                function startStep2() {
                    va('step2_reached');
                    localStorage.setItem('step2_time', Date.now());
                    typeText(document.getElementById('step2-text'), "Why are you here?", 50);
                    setTimeout(function() {
                        document.querySelectorAll('.step2-btn').forEach(function(btn, i) {
                            showButton(btn, i * 400);
                        });
                    }, 800);
                    setTimeout(startHesitationTimer, 800);
                }

                function step2Wrong() {
                    va('step2_failed');
                    haptic('wrong');
                    cancelHesitationTimer();
                    typeText(document.getElementById('step2-end-text'), "Then you're not ready.", 50);
                    fadeIn(document.getElementById('step2-end-extra'), 1500);
                }

                function startStep3() {
                    va('step3_reached');
                    localStorage.setItem('step3_time', Date.now());
                    typeText(document.getElementById('step3-text'), "What are you willing to offer?", 50);
                    document.querySelectorAll('.step3-btn').forEach(function(btn, i) {
                        showButton(btn, i * 400);
                    });
                    setTimeout(startHesitationTimer, 800);
                }

                function step3Wrong() {
                    va('step3_failed');
                    haptic('wrong');
                    cancelHesitationTimer();
                    typeText(document.getElementById('step3-end-text'), "Not enough.", 50);
                    fadeIn(document.getElementById('step3-end-extra'), 1500);
                }

                function correctAnswer() {
                    var s2 = Date.now() - parseInt(localStorage.getItem('step2_time') || Date.now());
                    var s3 = Date.now() - parseInt(localStorage.getItem('step3_time') || Date.now());
                    va('step2_duration_sec', Math.round(s2/1000));
                    va('step3_duration_sec', Math.round(s3/1000));
                    va('access_granted');
                    haptic('correct');
                    stopReturnCountdown();
                    sessionStorage.setItem('imani_access', 'granted');
                    typeText(document.getElementById('final-access'), "You have access.", 50);
                    fadeIn(document.getElementById('final-sub'), 1000);
                    document.querySelectorAll('.final-link').forEach(function(el, i) {
                        setTimeout(function() { el.classList.add('visible'); }, 1800 + i * 600);
                    });
                    document.querySelector('#fanvue-link').onclick = function() { va('fanvue_clicked'); };
                }

                window.nextStep = function(step) {
                    cancelHesitationTimer();
                    if (step === 1) {
                        va('step1_entered');
                        if (isReturningVisitor) startReturnCountdown();
                        var el = document.getElementById('step1');
                        el.classList.add('slide-up');
                        setTimeout(function() {
                            el.classList.remove('active', 'slide-up');
                            el.style.display = 'none';
                            document.getElementById('step2').classList.add('active');
                            startStep2();
                        }, 800);
                    }
                };

                window.selectOption = function(opt, step) {
                    cancelHesitationTimer();
                    if (step === 2) {
                        if (opt === 1) {
                            document.querySelector('.step2-btn').classList.add('correct-flash');
                            setTimeout(function() {
                                va('step2_reached');
                                document.getElementById('step2').classList.add('slide-up');
                                setTimeout(function() {
                                    document.getElementById('step2').style.display = 'none';
                                    document.getElementById('step3').classList.add('active');
                                    startStep3();
                                }, 800);
                            }, 400);
                        } else {
                            document.getElementById('step2').classList.add('slide-up');
                            setTimeout(function() {
                                document.getElementById('step2').style.display = 'none';
                                document.getElementById('step2-end').classList.add('active');
                                step2Wrong();
                            }, 800);
                        }
                    } else if (step === 3) {
                        if (opt === 3) {
                            document.querySelector('.step3-btn:last-child').classList.add('correct-flash');
                            setTimeout(function() {
                                document.getElementById('step3').classList.add('slide-up');
                                setTimeout(function() {
                                    document.getElementById('step3').style.display = 'none';
                                    document.getElementById('step-final').classList.add('active');
                                    document.getElementById('final-access').textContent = '';
                                    correctAnswer();
                                }, 800);
                            }, 400);
                        } else {
                            document.getElementById('step3').classList.add('slide-up');
                            setTimeout(function() {
                                document.getElementById('step3').style.display = 'none';
                                document.getElementById('step3-end').classList.add('active');
                                step3Wrong();
                            }, 800);
                        }
                    }
                };

                // Start experience after 1500ms
                setTimeout(function() {
                    typeText(document.getElementById('step1-text'), "Access is not a right.", 50, function() {
                        setTimeout(function() {
                            document.getElementById('step1-text').innerHTML += '<br>';
                            typeText(document.getElementById('step1-text'), "It's a response.", 50, function() {
                                setTimeout(function() {
                                    showButton(document.getElementById('step1-btn'), 1200);
                                }, 800);
                            });
                        }, 800);
                    });
                }, 1500);
            }
        });
    </script>
</body>
</html>
