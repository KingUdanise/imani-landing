<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imani Sterling</title>
    <meta property="og:title" content="Access is not a right.">
    <meta property="og:description" content="It's a response.">
    <meta property="og:image" content="https://imani-landing.vercel.app/background.jpg">
    <meta property="og:url" content="https://imani-landing.vercel.app">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Access is not a right.">
    <meta name="twitter:description" content="It's a response.">
    <meta name="twitter:image" content="https://imani-landing.vercel.app/background.jpg">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text y='.9em' font-size='90' fill='%23c9a84c'>I</text></svg>">
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --text: white;
            --accent: #c9a84c;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cormorant Garamond', 'Palatino Linotype', Georgia, serif;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center 20%;
            background-repeat: no-repeat;
            z-index: -1;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        body::before.loaded {
            opacity: 1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.78);
            z-index: 0;
        }

        #loading-dot {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            z-index: 3;
            animation: pulse 800ms ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        #landscape-lock {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            text-align: center;
            padding: 2rem;
        }

        @media (orientation: landscape) and (pointer: coarse) {
            #landscape-lock {
                display: flex;
            }
        }

        #cursor {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
            display: none;
        }

        #cursor.expanded {
            width: 20px;
            height: 20px;
        }

        @media (pointer: fine) {
            #cursor {
                display: block;
            }
        }

        #exit-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 9000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
        }

        #exit-overlay.show {
            display: flex;
        }

        #exit-overlay p {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #exit-overlay p.visible {
            opacity: 1;
        }

        .step {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
            z-index: 1;
        }

        .step.active {
            opacity: 1;
            pointer-events: auto;
        }

        .fade-out {
            opacity: 0;
        }

        h1, .question, .response-text {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-align: center;
            letter-spacing: 0.05em;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .sub-text {
            font-size: 0.85rem;
            opacity: 0.65;
            margin-bottom: 1.5rem;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .sub-text.visible {
            opacity: 0.65;
        }

        .hesitation-text {
            font-size: 0.75rem;
            font-style: italic;
            opacity: 0;
            margin-top: 1.5rem;
            transition: opacity 0.8s ease;
        }

        .hesitation-text.visible {
            opacity: 0.5;
        }

        .extra-text {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-top: 1rem;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .extra-text.visible {
            opacity: 0.6;
        }

        .links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.4rem;
        }

        .links a {
            color: var(--text);
            text-decoration: none;
            font-family: 'Cormorant Garamond', 'Palatino Linotype', Georgia, serif;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
            opacity: 0;
            display: block;
            margin: 1.4rem auto;
            text-align: center;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .links a.visible {
            opacity: 1;
        }

        .links a:hover {
            text-decoration: underline;
            text-decoration-color: var(--accent);
            text-decoration-thickness: 1px;
        }

        .plain-link {
            font-size: 0.9rem;
            opacity: 0.7;
            cursor: pointer;
        }

        button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: var(--text);
            font-family: 'Cormorant Garamond', 'Palatino Linotype', Georgia, serif;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            font-weight: 300;
            padding: 1rem 2rem;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            margin: 0.8rem auto;
            opacity: 0;
            width: min(320px, 85vw);
            min-height: 56px;
            display: block;
        }

        button.visible {
            opacity: 1;
        }

        button:hover {
            background: rgba(255,255,255,0.06);
            border-color: white;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            align-items: center;
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition-duration: 0.1ms !important; animation-duration: 0.1ms !important; }
        }
    </style>
</head>
<body>
    <div id="loading-dot"></div>
    <div id="landscape-lock">Rotate your phone.</div>
    <div id="cursor"></div>
    <div id="exit-overlay">
        <p id="exit-text-1"></p>
        <p id="exit-text-2"></p>
        <p id="exit-text-3"></p>
    </div>

    <div id="step1" class="step active">
        <h1 id="step1-text"></h1>
        <button id="step1-btn" onclick="nextStep(1)">I'm ready.</button>
    </div>

    <div id="step2" class="step">
        <p class="question" id="step2-text"></p>
        <div class="options">
            <button onclick="selectOption(1, 2)" class="step2-btn">I recognize value when I see it.</button>
            <button onclick="selectOption(2, 2)" class="step2-btn">I need to understand first.</button>
            <button onclick="selectOption(3, 2)" class="step2-btn">I'm just curious.</button>
        </div>
        <p class="hesitation-text" id="hesitation-step2">Most people who hesitate here don't come back.</p>
    </div>

    <div id="step2-end" class="step">
        <p class="response-text" id="step2-end-text"></p>
        <p class="extra-text" id="step2-end-extra">Access closes in 24 hours.</p>
        <a class="plain-link" onclick="restart()">Try again.</a>
    </div>

    <div id="step3" class="step">
        <p class="question" id="step3-text"></p>
        <div class="options">
            <button onclick="selectOption(1, 3)" class="step3-btn">My attention.</button>
            <button onclick="selectOption(2, 3)" class="step3-btn">My time.</button>
            <button onclick="selectOption(3, 3)" class="step3-btn">My resources.</button>
        </div>
        <p class="hesitation-text" id="hesitation-step3">Most people who hesitate here don't come back.</p>
    </div>

    <div id="step3-end" class="step">
        <p class="response-text" id="step3-end-text"></p>
        <p class="extra-text" id="step3-end-extra">Those who understand value don't hesitate.</p>
        <a class="plain-link" onclick="restart()">Try again.</a>
    </div>

    <div id="step-final" class="step">
        <p class="response-text" id="final-access"></p>
        <p class="sub-text" id="final-sub">You're one of few.</p>
        <div class="links">
            <a href="https://instagram.com/this.imani" target="_blank" class="final-link">Instagram</a>
            <a href="https://x.com/this_imani_" target="_blank" class="final-link">X</a>
            <a href="https://www.fanvue.com/this.imani" target="_blank" class="final-link" id="fanvue-link">Enter Imani's world</a>
        </div>
    </div>

    <script>
        const bg = document.querySelector('body::before');
        const loadingDot = document.getElementById('loading-dot');
        const cursor = document.getElementById('cursor');
        let exitIntentTriggered = false;
        let hesitationTimer = null;

        function va(eventName) {
            if (window.va) {
                window.va('event', { name: eventName });
            }
        }

        function haptic(type) {
            if (navigator.vibrate) {
                if (type === 'wrong') navigator.vibrate(300);
                else navigator.vibrate([80, 40, 80]);
            }
        }

        function typeText(element, text, speed, callback) {
            element.textContent = '';
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) setTimeout(callback, speed);
            }
            type();
        }

        function showButton(btn, delay) {
            setTimeout(() => btn.classList.add('visible'), delay);
        }

        function showElement(el, delay) {
            setTimeout(() => el.classList.add('visible'), delay);
        }

        function fadeIn(el, delay) {
            setTimeout(() => {
                el.style.opacity = '1';
                el.classList.add('visible');
            }, delay);
        }

        function showExitIntent() {
            if (exitIntentTriggered) return;
            exitIntentTriggered = true;
            const overlay = document.getElementById('exit-overlay');
            const t1 = document.getElementById('exit-text-1');
            const t2 = document.getElementById('exit-text-2');
            const t3 = document.getElementById('exit-text-3');
            overlay.classList.add('show');
            
            setTimeout(() => {
                t1.textContent = "You're leaving now.";
                t1.classList.add('visible');
            }, 100);

            setTimeout(() => {
                t2.textContent = "That's your choice.";
                t2.classList.add('visible');
            }, 900);

            setTimeout(() => {
                t3.textContent = "The door doesn't stay open.";
                t3.classList.add('visible');
            }, 1700);

            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.classList.remove('show');
                    overlay.style.opacity = '';
                }, 500);
            }, 4000);
        }

        function startHesitation(stepNum) {
            clearTimeout(hesitationTimer);
            const el = document.getElementById('hesitation-step' + stepNum);
            hesitationTimer = setTimeout(() => {
                if (el) el.classList.add('visible');
                setTimeout(() => el.classList.remove('visible'), 3000);
            }, 8000);
        }

        function restart() {
            sessionStorage.removeItem('imani_access');
            location.reload();
        }

        bg.onload = () => {
            bg.classList.add('loaded');
            loadingDot.style.display = 'none';
        };

        if (bg.complete) {
            bg.classList.add('loaded');
            loadingDot.style.display = 'none';
        }

        history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', () => history.pushState(null, null, window.location.href));

        if (sessionStorage.getItem('imani_access') === 'granted') {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step-final').classList.add('active');
            showElement(document.getElementById('final-access'), 100);
            setTimeout(() => showElement(document.getElementById('final-sub'), 1000), 1000);
            ['.final-link'].forEach((sel, i) => {
                document.querySelectorAll(sel).forEach((el, j) => {
                    setTimeout(() => el.classList.add('visible'), 1800 + (i * 600) + (j * 600));
                });
            });
            document.querySelector('#fanvue-link').onclick = () => va('fanvue_clicked');
        } else {
            if (window.matchMedia('(pointer: fine)').matches) {
                document.addEventListener('mousemove', (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                });
                document.querySelectorAll('button, .links a, .plain-link').forEach(el => {
                    el.addEventListener('mouseenter', () => cursor.classList.add('expanded'));
                    el.addEventListener('mouseleave', () => cursor.classList.remove('expanded'));
                });
            }

            document.addEventListener('mouseleave', (e) => {
                if (e.clientY <= 0) showExitIntent();
            });

            let touchStartY = 0;
            document.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
            document.addEventListener('touchmove', (e) => {
                const dy = touchStartY - e.touches[0].clientY;
                if (dy > 50) showExitIntent();
            });

            function startStep2() {
                va('step2_reached');
                typeText(document.getElementById('step2-text'), "Why are you here?", 50);
                setTimeout(() => {
                    document.querySelectorAll('.step2-btn').forEach((btn, i) => {
                        showButton(btn, i * 400);
                    });
                }, 800);
                startHesitation(2);
            }

            function step2Wrong() {
                va('step2_failed');
                haptic('wrong');
                clearTimeout(hesitationTimer);
                typeText(document.getElementById('step2-end-text'), "Then you're not ready.", 50);
                fadeIn(document.getElementById('step2-end-extra'), 1500);
            }

            function startStep3() {
                va('step3_reached');
                typeText(document.getElementById('step3-text'), "What are you willing to offer?", 50);
                document.querySelectorAll('.step3-btn').forEach((btn, i) => {
                    showButton(btn, i * 400);
                });
                startHesitation(3);
            }

            function step3Wrong() {
                va('step3_failed');
                haptic('wrong');
                clearTimeout(hesitationTimer);
                typeText(document.getElementById('step3-end-text'), "Not enough.", 50);
                fadeIn(document.getElementById('step3-end-extra'), 1500);
            }

            function correctAnswer() {
                va('access_granted');
                haptic('correct');
                sessionStorage.setItem('imani_access', 'granted');
                typeText(document.getElementById('final-access'), "You have access.", 50);
                fadeIn(document.getElementById('final-sub'), 1000);
                ['.final-link'].forEach((sel, i) => {
                    document.querySelectorAll(sel).forEach((el, j) => {
                        setTimeout(() => el.classList.add('visible'), 1800 + (i * 600) + (j * 600));
                    });
                });
                document.querySelector('#fanvue-link').onclick = () => va('fanvue_clicked');
            }

            window.nextStep = function(step) {
                clearTimeout(hesitationTimer);
                if (step === 1) {
                    va('step1_entered');
                    const el = document.getElementById('step1');
                    el.classList.remove('active');
                    setTimeout(() => {
                        el.classList.add('fade-out');
                        setTimeout(() => {
                            document.getElementById('step1').style.display = 'none';
                            document.getElementById('step2').classList.add('active');
                            startStep2();
                        }, 1500);
                    }, 100);
                }
            };

            window.selectOption = function(opt, step) {
                clearTimeout(hesitationTimer);
                if (step === 2) {
                    if (opt === 1) {
                        va('step2_reached');
                        const el = document.getElementById('step2');
                        el.classList.remove('active');
                        setTimeout(() => {
                            el.classList.add('fade-out');
                            setTimeout(() => {
                                document.getElementById('step2').style.display = 'none';
                                document.getElementById('step3').classList.add('active');
                                startStep3();
                            }, 1500);
                        }, 100);
                    } else {
                        const el = document.getElementById('step2');
                        el.classList.remove('active');
                        setTimeout(() => {
                            el.classList.add('fade-out');
                            setTimeout(() => {
                                document.getElementById('step2').style.display = 'none';
                                document.getElementById('step2-end').classList.add('active');
                                step2Wrong();
                            }, 1500);
                        }, 100);
                    }
                } else if (step === 3) {
                    if (opt === 3) {
                        const el = document.getElementById('step3');
                        el.classList.remove('active');
                        setTimeout(() => {
                            el.classList.add('fade-out');
                            setTimeout(() => {
                                document.getElementById('step3').style.display = 'none';
                                document.getElementById('step-final').classList.add('active');
                                document.getElementById('final-access').textContent = '';
                                correctAnswer();
                            }, 1500);
                        }, 100);
                    } else {
                        const el = document.getElementById('step3');
                        el.classList.remove('active');
                        setTimeout(() => {
                            el.classList.add('fade-out');
                            setTimeout(() => {
                                document.getElementById('step3').style.display = 'none';
                                document.getElementById('step3-end').classList.add('active');
                                step3Wrong();
                            }, 1500);
                        }, 100);
                    }
                }
            };

            setTimeout(() => {
                typeText(document.getElementById('step1-text'), "Access is not a right.", 50, () => {
                    setTimeout(() => {
                        typeText(document.getElementById('step1-text'), "It's a response.", 50, () => {
                            setTimeout(() => {
                                showButton(document.getElementById('step1-btn'), 1200);
                            }, 800);
                        });
                    }, 800);
                });
            }, 1800);
        }
    </script>
</body>
</html>
