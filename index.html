<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imani Sterling</title>
    <meta property="og:title" content="Access is not a right.">
    <meta property="og:description" content="It's a response.">
    <meta property="og:image" content="https://imani-landing.vercel.app/background.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://imani-landing.vercel.app/background.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text y='.9em' font-size='90' fill='%23c9a84c'>I</text></svg>">
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; margin: 0; padding: 0; }
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }
        
        /* Z-INDEX HIERARCHY */
        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('./background.jpg');
            background-size: cover;
            background-position: center center;
            z-index: 0;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        
        #bg.loaded {
            opacity: 1;
        }
        
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.78);
            z-index: 1;
            pointer-events: none;
        }
        
        .step {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
            overflow: hidden;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        
        .step.active {
            display: flex;
        }
        
        h1, .question {
            font-size: clamp(1.3rem, 4vw, 2rem);
            text-align: center;
            letter-spacing: 0.05em;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .sub-text {
            font-size: 0.85rem;
            opacity: 0;
            margin-bottom: 1.5rem;
            transition: opacity 0.8s ease;
        }
        
        .extra-text {
            font-size: 0.8rem;
            opacity: 0;
            margin-top: 1rem;
            transition: opacity 0.8s ease;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
            margin-top: 1rem;
        }
        
        .links a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        .links a:hover {
            text-decoration: underline;
            text-decoration-color: #c9a84c;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            margin-top: 2rem;
        }
        
        /* BUTTONS */
        button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            padding: 1rem 2rem;
            letter-spacing: 0.1em;
            width: min(300px, 80vw);
            min-height: 50px;
            display: block;
            margin: 0.8rem auto;
            cursor: pointer;
            pointer-events: auto;
            position: relative;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease;
        }
        
        button:hover {
            background: rgba(255,255,255,0.06);
            border-color: white;
        }
        
        /* UI ELEMENTS */
        #sound-toggle {
            position: fixed;
            top: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            cursor: pointer;
            color: #c9a84c;
            opacity: 0.3;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: none;
            border: none;
        }
        
        #cursor {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #c9a84c;
            position: fixed;
            pointer-events: none;
            z-index: 50;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 8px rgba(201,168,76,0.35);
        }
        
        #return-timer {
            position: fixed;
            top: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 0.9rem;
            color: #c9a84c;
            opacity: 0.6;
            letter-spacing: 0.15em;
            pointer-events: none;
        }
        
        /* HESITATION TEXT */
        #hesitation-text {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 60;
            text-align: center;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            color: white;
            letter-spacing: 0.08em;
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
            width: 80%;
            max-width: 500px;
        }
        
        .try-link {
            color: white;
            opacity: 0.5;
            font-size: 0.78rem;
            cursor: pointer;
            font-family: 'Cormorant Garamond', Georgia, serif;
            letter-spacing: 0.12em;
            background: none;
            border: none;
            margin-top: 1.5rem;
            text-decoration: none;
        }
        
        .try-link:hover { opacity: 0.8; }
        
        @media (max-height: 600px) {
            h1, .question { font-size: clamp(1.1rem, 3.4vw, 1.7rem); }
            button { min-height: 40px; }
            .links { gap: 0.5rem; margin-top: 1rem; }
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="overlay"></div>
    <button id="sound-toggle">sound</button>
    <div id="return-timer"></div>
    <div id="cursor"></div>
    <div id="hesitation-text"></div>
    
    <!-- STEP 1 -->
    <div class="step" id="step1" style="display:flex;">
        <h1 id="step1-h1"></h1>
        <button onclick="goStep2()" style="display:none">I'm ready.</button>
    </div>
    
    <!-- STEP 2 -->
    <div class="step" id="step2">
        <p class="question" id="step2-q"></p>
        <div class="options">
            <button onclick="selectStep2(1)" style="opacity:0;visibility:hidden">I recognize value when I see it.</button>
            <button onclick="selectStep2(2)" style="opacity:0;visibility:hidden">I need to understand first.</button>
            <button onclick="selectStep2(3)" style="opacity:0;visibility:hidden">I'm just curious.</button>
        </div>
    </div>
    
    <!-- STEP 2 FAIL -->
    <div class="step" id="step2-fail">
        <p class="question" id="step2fail-q"></p>
        <p class="extra-text" id="step2fail-extra"></p>
        <button class="trylink" onclick="tryAgain()">Try again.</button>
    </div>
    
    <!-- STEP 3 -->
    <div class="step" id="step3">
        <p class="question" id="step3-q"></p>
        <div class="options">
            <button onclick="selectStep3(1)" style="opacity:0;visibility:hidden">My attention.</button>
            <button onclick="selectStep3(2)" style="opacity:0;visibility:hidden">My time.</button>
            <button onclick="selectStep3(3)" style="opacity:0;visibility:hidden">My resources.</button>
        </div>
    </div>
    
    <!-- STEP 3 FAIL -->
    <div class="step" id="step3-fail">
        <p class="question" id="step3fail-q"></p>
        <p class="extra-text" id="step3fail-extra"></p>
        <button class="trylink" onclick="tryAgain()">Try again.</button>
    </div>
    
    <!-- STEP ACCESS -->
    <div class="step" id="step-access">
        <h1 id="access-h1"></h1>
        <p class="sub-text" id="access-sub" style="display:none">You're one of few.</p>
        <div class="links">
            <a href="https://instagram.com/this.imani" target="_blank" style="display:none">Instagram</a>
            <a href="https://x.com/this_imani_" target="_blank" style="display:none">X</a>
            <a href="https://www.fanvue.com/this.imani" target="_blank" style="display:none">Claim your access →</a>
        </div>
    </div>
    
    <script>
        // SOUND
        var soundOn = false;
        var audioCtx = null;
        
        document.getElementById('sound-toggle').onclick = function() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            soundOn = !soundOn;
            document.getElementById('sound-toggle').textContent = soundOn ? 'sound ●' : 'sound';
        };
        
        function playTick() {
            if (!soundOn || !audioCtx) return;
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 600;
            gain.gain.setValueAtTime(0.025, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        }
        
        // CURSOR
        if (window.matchMedia('(pointer: fine)').matches) {
            var cur = document.getElementById('cursor');
            cur.style.display = 'block';
            document.addEventListener('mousemove', function(e) {
                cur.style.left = e.clientX + 'px';
                cur.style.top = e.clientY + 'px';
            });
        }
        
        // INSTAGRAM BANNER
        if (/Instagram|FBAN|FBAV/.test(navigator.userAgent)) {
            var banner = document.createElement('div');
            banner.textContent = 'For best experience, open in Safari or Chrome';
            banner.style.cssText = 'position:fixed;bottom:0;left:0;width:100%;text-align:center;font-size:0.6rem;color:white;opacity:0.35;padding:0.6rem;z-index:1000;cursor:pointer;font-family:Cormorant Garamond,Georgia,serif;letter-spacing:0.1em;';
            banner.onclick = function() { banner.style.display = 'none'; };
            document.body.appendChild(banner);
        }
        
        // HESITATION
        var hesTimer = null;
        var hesitationActive = false;
        
        function cancelHesitationTimer() {
            if (hesTimer) { clearTimeout(hesTimer); hesTimer = null; }
            hesitationActive = false;
        }
        
        function startHesTimer() {
            cancelHesitationTimer();
            hesTimer = setTimeout(runHesSequence, 8000);
        }
        
        function clearHesTimer() {
            if (hesTimer) { clearTimeout(hesTimer); hesTimer = null; }
        }
        
        function runHesSequence() {
            var activeStep = document.querySelector('.step.active');
            if (!activeStep) return;
            hesitationActive = true;
            
            activeStep.style.transition = 'opacity 0.5s ease';
            activeStep.style.opacity = '0';
            setTimeout(function() {
                activeStep.style.display = 'none';
            }, 500);
            
            var timerEl = document.getElementById('return-timer');
            if (timerEl) timerEl.style.display = 'none';
            
            if (!hesitationActive) return;
            showHesitationMessage("You're still thinking.", 2600, function() {
                if (!hesitationActive) return;
                showHesitationMessage("That's already an answer.", 2600, function() {
                    if (!hesitationActive) return;
                    showHesitationMessage("The ones who belong here don't hesitate.", 2600, function() {
                        if (!hesitationActive) return;
                        showHesitationMessage("Access is closing.", 2100, function() {
                            if (!hesitationActive) return;
                            showCountdown();
                        });
                    });
                });
            });
        }
        
        function showHesitationMessage(text, duration, callback) {
            if (!hesitationActive) return;
            var el = document.getElementById('hesitation-text');
            el.style.display = 'block';
            el.style.fontSize = 'clamp(1.2rem, 4vw, 1.8rem)';
            el.style.color = 'white';
            el.textContent = text;
            el.style.opacity = '0';
            setTimeout(function() { el.style.opacity = '1'; }, 50);
            setTimeout(function() {
                el.style.opacity = '0';
                setTimeout(function() { if (callback) callback(); }, 400);
            }, duration);
        }
        
        function showCountdown() {
            if (!hesitationActive) return;
            var el = document.getElementById('hesitation-text');
            var numbers = ['5','4','3','2','1'];
            var i = 0;
            
            function showNumber() {
                if (!hesitationActive) return;
                if (i >= numbers.length) {
                    showFinalMessage();
                    return;
                }
                el.style.fontSize = '4rem';
                el.style.color = '#c9a84c';
                el.textContent = numbers[i];
                el.style.opacity = '0';
                setTimeout(function() { el.style.opacity = '1'; }, 50);
                setTimeout(function() {
                    el.style.opacity = '0';
                    setTimeout(function() {
                        i++;
                        showNumber();
                    }, 200);
                }, 900);
            }
            showNumber();
        }
        
        function showFinalMessage() {
            if (!hesitationActive) return;
            var el = document.getElementById('hesitation-text');
            el.style.fontSize = 'clamp(1.2rem, 4vw, 1.8rem)';
            el.style.color = 'white';
            el.textContent = 'Access closed.';
            el.style.opacity = '0';
            setTimeout(function() { el.style.opacity = '1'; }, 50);
            setTimeout(function() {
                localStorage.setItem('imani_visited', 'true');
                window.location.href = '/closed.html';
            }, 2000);
        }
        
        // RETURNING VISITOR TIMER
        var returnTimer = null;
        
        function startReturnTimer() {
            var seconds = 30;
            var timerEl = document.getElementById('return-timer');
            timerEl.textContent = '0:30';
            timerEl.style.display = 'block';
            returnTimer = setInterval(function() {
                seconds--;
                var secs = seconds % 60;
                timerEl.textContent = '0:' + (secs < 10 ? '0' : '') + secs;
                if (seconds <= 0) {
                    clearInterval(returnTimer);
                    window.location.href = '/closed.html';
                }
            }, 1000);
        }
        
        function stopReturnTimer() {
            if (returnTimer) { clearInterval(returnTimer); returnTimer = null; }
            var t = document.getElementById('return-timer');
            if (t) t.style.display = 'none';
        }
        
        // TYPEWRITER
        function typeText(element, text, speed, callback) {
            element.textContent = '';
            var i = 0;
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    playTick();
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    setTimeout(callback, speed);
                }
            }
            type();
        }
        
        function fadeIn(element, delay) {
            delay = delay || 0;
            setTimeout(function() {
                element.style.opacity = '0';
                element.style.display = 'block';
                element.style.transition = 'opacity 0.8s ease';
                setTimeout(function() {
                    element.style.opacity = '1';
                }, 50);
            }, delay);
        }
        
        function fadeInButton(element, delay) {
            setTimeout(function() {
                element.style.transition = 'opacity 0.8s ease';
                element.style.visibility = 'visible';
                element.style.opacity = '1';
            }, delay);
        }
        
        // SHOW STEP
        function showStep(stepId) {
            document.querySelectorAll('.step').forEach(function(s) { 
                s.classList.remove('active'); 
                s.style.display = 'none'; 
                s.style.opacity = '1';
            });
            var step = document.getElementById(stepId);
            step.style.display = 'flex';
            step.classList.add('active');
        }
        
        // TRY AGAIN
        function tryAgain() {
            sessionStorage.removeItem('imani_access');
            window.location.reload();
        }
        
        // STEP NAVIGATION
        function goStep2() {
            if (hesitationActive) {
                hesitationActive = false;
                var el = document.getElementById('hesitation-text');
                el.style.opacity = '0';
                setTimeout(function() { el.style.display = 'none'; }, 600);
                var activeStep = document.querySelector('.step.active');
                if (activeStep) {
                    activeStep.style.display = 'flex';
                    activeStep.style.opacity = '1';
                }
                var timer = document.getElementById('return-timer');
                if (timer) timer.style.display = 'block';
            }
            clearHesTimer();
            showStep('step2');
            typeText(document.getElementById('step2-q'), "Why are you here?", 50, function() {
                var btns = document.querySelectorAll('#step2 button');
                fadeInButton(btns[0], 0);
                fadeInButton(btns[1], 400);
                fadeInButton(btns[2], 800);
                setTimeout(startHesTimer, 1500);
            });
        }
        
        function selectStep2(opt) {
            if (hesitationActive) {
                hesitationActive = false;
                var el = document.getElementById('hesitation-text');
                el.style.opacity = '0';
                setTimeout(function() { el.style.display = 'none'; }, 600);
                var activeStep = document.querySelector('.step.active');
                if (activeStep) {
                    activeStep.style.display = 'flex';
                    activeStep.style.opacity = '1';
                }
                var timer = document.getElementById('return-timer');
                if (timer) timer.style.display = 'block';
            }
            clearHesTimer();
            if (opt === 1) {
                showStep('step3');
                typeText(document.getElementById('step3-q'), "What are you willing to offer?", 50, function() {
                    var btns = document.querySelectorAll('#step3 button');
                    fadeInButton(btns[0], 0);
                    fadeInButton(btns[1], 400);
                    fadeInButton(btns[2], 800);
                    setTimeout(startHesTimer, 1500);
                });
            } else {
                showStep('step2-fail');
                typeText(document.getElementById('step2fail-q'), "Then you're not ready.", 50, function() {
                    setTimeout(function() {
                        fadeIn(document.getElementById('step2fail-extra'), 0);
                    }, 1500);
                });
            }
        }
        
        function selectStep3(opt) {
            if (hesitationActive) {
                hesitationActive = false;
                var el = document.getElementById('hesitation-text');
                el.style.opacity = '0';
                setTimeout(function() { el.style.display = 'none'; }, 600);
                var activeStep = document.querySelector('.step.active');
                if (activeStep) {
                    activeStep.style.display = 'flex';
                    activeStep.style.opacity = '1';
                }
                var timer = document.getElementById('return-timer');
                if (timer) timer.style.display = 'block';
            }
            clearHesTimer();
            if (opt === 3) {
                showStep('step-access');
                sessionStorage.setItem('imani_access', 'granted');
                stopReturnTimer();
                fadeIn(document.getElementById('access-sub'), 0);
                typeText(document.getElementById('access-h1'), "You have access.", 50, function() {
                    setTimeout(function() {
                        var links = document.querySelectorAll('#step-access .links a');
                        fadeIn(links[0], 0);
                        fadeIn(links[1], 300);
                        fadeIn(links[2], 600);
                    }, 1000);
                });
            } else {
                showStep('step3-fail');
                typeText(document.getElementById('step3fail-q'), "Not enough.", 50, function() {
                    setTimeout(function() {
                        fadeIn(document.getElementById('step3fail-extra'), 0);
                    }, 1500);
                });
            }
        }
        
        // INIT
        function init() {
            document.getElementById('bg').classList.add('loaded');
            
            if (sessionStorage.getItem('imani_access') === 'granted') {
                showStep('step-access');
                document.getElementById('access-h1').textContent = 'You have access.';
                fadeIn(document.getElementById('access-sub'), 0);
                var links = document.querySelectorAll('#step-access .links a');
                fadeIn(links[0], 0);
                fadeIn(links[1], 300);
                fadeIn(links[2], 600);
                return;
            }
            
            if (localStorage.getItem('imani_visited')) {
                startReturnTimer();
            }
            
            typeText(document.getElementById('step1-h1'), "Access is not a right.", 50, function() {
                setTimeout(function() {
                    document.getElementById('step1-h1').innerHTML += '<br>';
                    typeText(document.getElementById('step1-h1'), "It's a response.", 50, function() {
                        setTimeout(function() {
                            fadeIn(document.querySelector('#step1 button'), 0);
                        }, 1200);
                    });
                }, 800);
            });
        }
        
        setTimeout(init, 500);
    </script>
</body>
</html>
