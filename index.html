<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imani Sterling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        :root {
            --bg: #0a0a0a;
            --text: white;
            --hover: #888;
            --accent: #c9a84c;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.80);
            z-index: 0;
        }

        #cursor {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
        }

        #cursor.expanded {
            width: 20px;
            height: 20px;
        }

        #countdown {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            z-index: 2;
        }

        #countdown span {
            font-family: 'Cormorant Garamond', serif;
            font-size: 10rem;
            color: white;
            opacity: 0;
            transition: opacity 0.45s ease;
        }

        #countdown span.visible {
            opacity: 0.12;
        }

        .step {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
            z-index: 1;
        }

        .step.active {
            opacity: 1;
            pointer-events: auto;
        }

        .fade-out {
            opacity: 0;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-align: center;
            letter-spacing: 0.05em;
            line-height: 1.6;
            margin-bottom: 3rem;
            display: inline;
        }

        .question {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-align: center;
            letter-spacing: 0.05em;
            line-height: 1.6;
            margin-bottom: 3rem;
            display: inline;
        }

        .response-text {
            font-size: clamp(1.5rem, 4vw, 2rem);
            text-align: center;
            letter-spacing: 0.05em;
            display: inline;
        }

        .access-text {
            font-size: clamp(1.5rem, 4vw, 2rem);
            text-align: center;
            letter-spacing: 0.05em;
            margin-bottom: 3rem;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .access-text.visible {
            opacity: 1;
        }

        .links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        .links a {
            color: var(--text);
            text-decoration: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
            opacity: 0;
            display: block;
            margin: 1.2rem auto;
            transition: all 0.3s ease;
        }

        .links a.visible {
            opacity: 1;
        }

        .links a:hover {
            text-decoration: underline;
            text-decoration-color: var(--accent);
        }

        button {
            background: transparent;
            border: 1px solid var(--text);
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1rem, 3vw, 1.25rem);
            font-weight: 300;
            padding: 1rem 2rem;
            cursor: none;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            margin: 0.5rem;
            opacity: 0;
        }

        button.visible {
            opacity: 1;
        }

        button:hover {
            background: var(--text);
            color: var(--bg);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        @media (min-width: 480px) {
            .options {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        .typed-cursor {
            border-right: 2px solid var(--text);
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { border-color: var(--text); }
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="countdown"><span></span></div>

    <div id="step1" class="step active">
        <h1><span class="typed-text"></span></h1>
        <button onclick="nextStep(1)">Continue</button>
    </div>

    <div id="step2" class="step">
        <p class="question"><span class="typed-text"></span></p>
        <div class="options">
            <button onclick="selectOption(1, 1)" class="typed-btn">I recognize value when I see it.</button>
            <button onclick="selectOption(2, 1)" class="typed-btn">I need to understand first.</button>
            <button onclick="selectOption(3, 1)" class="typed-btn">I'm just curious.</button>
        </div>
    </div>

    <div id="step2-end" class="step">
        <p class="response-text"><span class="typed-text"></span></p>
    </div>

    <div id="step3" class="step">
        <p class="question"><span class="typed-text"></span></p>
        <div class="options">
            <button onclick="selectOption(1, 3)" class="typed-btn">My attention.</button>
            <button onclick="selectOption(2, 3)" class="typed-btn">My time.</button>
            <button onclick="selectOption(3, 3)" class="typed-btn">My resources.</button>
        </div>
    </div>

    <div id="step3-end" class="step">
        <p class="response-text"><span class="typed-text"></span></p>
    </div>

    <div id="step-final" class="step">
        <p id="access-text" class="access-text">You have access.</p>
        <div class="links">
            <a href="https://instagram.com/this.imani" target="_blank">Instagram</a>
            <a href="https://x.com/this_imani_" target="_blank">X</a>
            <a href="https://www.fanvue.com/this.imani" target="_blank">FanVue</a>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        const countdownEl = document.getElementById('countdown').querySelector('span');
        let typedTexts = {};

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mouseenter', () => cursor.classList.add('expanded'));
            btn.addEventListener('mouseleave', () => cursor.classList.remove('expanded'));
        });

        function haptic(type) {
            if (navigator.vibrate) {
                if (type === 'wrong') {
                    navigator.vibrate(300);
                } else {
                    navigator.vibrate([80, 40, 80]);
                }
            }
        }

        function typeWriter(element, text, speed, callback) {
            element.textContent = '';
            let i = 0;
            const isQuestion = element.classList.contains('question') || element.classList.contains('response-text');
            const localSpeed = isQuestion ? 35 : speed;
            
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, localSpeed);
                } else if (callback) {
                    setTimeout(callback, 600);
                }
            }
            type();
        }

        function showButtons(selector) {
            document.querySelectorAll(selector).forEach(btn => {
                setTimeout(() => btn.classList.add('visible'), 100);
            });
        }

        function runCountdown(callback) {
            const countdown = document.getElementById('countdown');
            countdown.style.display = 'flex';
            let count = 5;
            
            function showNumber() {
                countdownEl.textContent = count;
                countdownEl.classList.add('visible');
                
                setTimeout(() => {
                    countdownEl.classList.remove('visible');
                }, 900);
                
                if (count > 0) {
                    count--;
                    setTimeout(showNumber, 900);
                } else {
                    setTimeout(() => {
                        countdown.style.display = 'none';
                        if (callback) callback();
                    }, 900);
                }
            }
            showNumber();
        }

        const texts = {
            'step1': 'Access is not a right.\nIt\'s a response.',
            'step2': 'Why are you here?',
            'step2-end': 'Then you\'re not ready.',
            'step3': 'What are you willing to offer?',
            'step3-end': 'Not enough.'
        };

        function replaceBrWithBreak(text) {
            return text.replace(/\n/g, '<br>');
        }

        document.getElementById('step1').querySelector('h1').innerHTML = '<span class="typed-text"></span>';

        function initTyping() {
            const step1El = document.querySelector('#step1 h1 .typed-text');
            typeWriter(step1El, 'Access is not a right.\nIt\'s a response.', 50, () => {
                showButtons('#step1 button');
            });
        }

        runCountdown(initTyping);

        function fadeOut(element, callback) {
            element.classList.remove('active');
            element.classList.add('fade-out');
            setTimeout(() => {
                element.classList.remove('fade-out');
                if (callback) callback();
            }, 1500);
        }

        function showStep(stepId) {
            const nextStepEl = document.getElementById(stepId);
            nextStepEl.classList.add('active');
            
            if (texts[stepId]) {
                const textEl = nextStepEl.querySelector('.typed-text') || nextStepEl.querySelector('.question .typed-text') || nextStepEl.querySelector('.response-text .typed-text');
                const el = nextStepEl.querySelector('.question') || nextStepEl.querySelector('.response-text');
                if (el) {
                    el.innerHTML = '<span class="typed-text"></span>';
                    const typedEl = el.querySelector('.typed-text');
                    typeWriter(typedEl, texts[stepId], 50, () => {
                        if (stepId === 'step2') {
                            showButtons('#step2 .typed-btn');
                        } else if (stepId === 'step3') {
                            showButtons('#step3 .typed-btn');
                        }
                    });
                }
            }
        }

        function nextStep(current) {
            const currentEl = document.getElementById('step' + current);
            fadeOut(currentEl, () => showStep('step' + (current + 1)));
        }

        function showAccessLinks() {
            const accessText = document.getElementById('access-text');
            const links = document.querySelectorAll('.links a');

            setTimeout(() => {
                accessText.classList.add('visible');
            }, 100);

            setTimeout(() => {
                links[0].classList.add('visible');
            }, 600);

            setTimeout(() => {
                links[1].classList.add('visible');
            }, 1200);

            setTimeout(() => {
                links[2].classList.add('visible');
            }, 1800);
        }

        function selectOption(option, step) {
            if (step === 1) {
                if (option === 1) {
                    haptic('correct');
                    const currentEl = document.getElementById('step2');
                    fadeOut(currentEl, () => showStep('step3'));
                } else {
                    haptic('wrong');
                    const currentEl = document.getElementById('step2');
                    fadeOut(currentEl, () => showStep('step2-end'));
                }
            } else if (step === 3) {
                if (option === 3) {
                    haptic('correct');
                    const currentEl = document.getElementById('step3');
                    fadeOut(currentEl, () => {
                        showStep('step-final');
                        showAccessLinks();
                    });
                } else {
                    haptic('wrong');
                    const currentEl = document.getElementById('step3');
                    fadeOut(currentEl, () => showStep('step3-end'));
                }
            }
        }
    </script>
</body>
</html>
