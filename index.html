<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imani Sterling</title>
    <meta property="og:title" content="Access is not a right.">
    <meta property="og:description" content="It's a response.">
    <meta property="og:image" content="https://imani-landing.vercel.app/background.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://imani-landing.vercel.app/background.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text y='.9em' font-size='90' fill='%23c9a84c'>I</text></svg>">
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; margin: 0; padding: 0; }
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }
        
        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('./background.jpg');
            background-size: cover;
            background-position: center center;
            z-index: 0;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        
        #bg.loaded { opacity: 1; }
        
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.78);
            z-index: 1;
            pointer-events: none;
        }
        
        #step1, #step2, #step3, #rejection, #final, #hesitation-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
            overflow: hidden;
            z-index: 10;
        }
        
        #step1 { display: flex; }
        
        #step1-text1, #step1-text2, #step2-question, #step3-question, #rejection-text, #final-text1 {
            font-size: clamp(1.3rem, 4vw, 2rem);
            letter-spacing: 0.05em;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }
        
        #step2-question, #step3-question {
            margin-bottom: 2rem;
        }
        
        #final-text2 {
            font-size: 0.85rem;
            margin-top: 1rem;
            visibility: hidden;
        }
        
        .step-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            padding: 1rem 2rem;
            letter-spacing: 0.1em;
            width: min(300px, 80vw);
            min-height: 50px;
            display: block;
            margin: 0.8rem auto;
            cursor: pointer;
            visibility: hidden;
            transition: opacity 0.8s ease, background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .step-btn:hover {
            background: rgba(255,255,255,0.06);
            border-color: white;
        }
        
        #step1-btn {
            opacity: 0;
            visibility: hidden;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            margin-top: 2rem;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
            margin-top: 1rem;
        }
        
        .links a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
            visibility: hidden;
            transition: opacity 0.8s ease;
        }
        
        .links a:hover {
            text-decoration: underline;
            text-decoration-color: #c9a84c;
        }
        
        #rejection-sub, #rejection-retry {
            font-size: 0.85rem;
            margin-top: 1.5rem;
            visibility: hidden;
        }
        
        #rejection-retry {
            color: white;
            opacity: 0.5;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Cormorant Garamond', Georgia, serif;
            letter-spacing: 0.12em;
        }
        
        #rejection-retry:hover { opacity: 0.8; }
        
        #sound-toggle {
            position: fixed;
            top: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            cursor: pointer;
            color: #c9a84c;
            opacity: 0.3;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: none;
            border: none;
        }
        
        #cursor {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #c9a84c;
            position: fixed;
            pointer-events: none;
            z-index: 50;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 8px rgba(201,168,76,0.35);
        }
        
        #return-timer {
            position: fixed;
            top: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 0.9rem;
            color: #c9a84c;
            opacity: 0.6;
            letter-spacing: 0.15em;
            pointer-events: none;
            display: none;
        }
        
        #hesitation-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 60;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #hesitation-text {
            text-align: center;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            color: white;
            letter-spacing: 0.08em;
            transition: opacity 0.6s ease;
        }
        
        #exit-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 70;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Cormorant Garamond', Georgia, serif;
            text-align: center;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            letter-spacing: 0.08em;
        }
        
        @media (max-height: 600px) {
            #step1-text1, #step1-text2, #step2-question, #step3-question { font-size: clamp(1.1rem, 3.4vw, 1.7rem); }
            .step-btn { min-height: 40px; }
            .links { gap: 0.5rem; margin-top: 1rem; }
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="overlay"></div>
    <button id="sound-toggle">sound</button>
    <div id="return-timer"></div>
    <div id="cursor"></div>
    
    <!-- STEP 1 -->
    <div id="step1">
        <p id="step1-text1"></p>
        <p id="step1-text2"></p>
        <button id="step1-btn" class="step-btn">I'm ready.</button>
    </div>
    
    <!-- STEP 2 -->
    <div id="step2">
        <p id="step2-question"></p>
        <div id="step2-options" class="options">
            <button id="step2-btn1" class="step-btn">I recognize value when I see it.</button>
            <button id="step2-btn2" class="step-btn">I need to understand first.</button>
            <button id="step2-btn3" class="step-btn">I'm just curious.</button>
        </div>
    </div>
    
    <!-- STEP 3 -->
    <div id="step3">
        <p id="step3-question"></p>
        <div class="options">
            <button id="step3-btn1" class="step-btn">My attention.</button>
            <button id="step3-btn2" class="step-btn">My time.</button>
            <button id="step3-btn3" class="step-btn">My resources.</button>
        </div>
    </div>
    
    <!-- REJECTION -->
    <div id="rejection">
        <p id="rejection-text"></p>
        <p id="rejection-sub">Access closes in 24 hours.</p>
        <button id="rejection-retry">Try again.</button>
    </div>
    
    <!-- FINAL -->
    <div id="final">
        <p id="final-text1"></p>
        <p id="final-text2">You're one of few.</p>
        <div class="links">
            <a id="final-link1" href="https://instagram.com/this.imani" target="_blank">Instagram</a>
            <a id="final-link2" href="https://x.com/this_imani_" target="_blank">X</a>
            <a id="final-link3" href="https://www.fanvue.com/this.imani" target="_blank">Claim your access</a>
        </div>
    </div>
    
    <!-- HESITATION OVERLAY -->
    <div id="hesitation-overlay">
        <p id="hesitation-text"></p>
    </div>
    
    <!-- EXIT OVERLAY -->
    <div id="exit-overlay">Access is not a right.</div>
    
    <script>
document.addEventListener('DOMContentLoaded', function() {

  // ============ UTILITIES ============
  
  function typeText(elementId, text, speed, callback) {
    const el = document.getElementById(elementId);
    if (!el) { if (callback) callback(); return; }
    el.textContent = '';
    let i = 0;
    function next() {
      if (i < text.length) {
        el.textContent += text[i];
        playTick();
        i++;
        setTimeout(next, speed);
      } else {
        if (callback) callback();
      }
    }
    next();
  }

  function fadeIn(elementId, delay, callback) {
    delay = delay || 0;
    setTimeout(function() {
      const el = document.getElementById(elementId);
      if (!el) { if (callback) callback(); return; }
      el.style.opacity = '0';
      el.style.visibility = 'visible';
      el.style.transition = 'opacity 0.8s ease';
      setTimeout(function() {
        el.style.opacity = '1';
        if (callback) setTimeout(callback, 800);
      }, 50);
    }, delay);
  }

  function hideElement(elementId) {
    const el = document.getElementById(elementId);
    if (el) { el.style.display = 'none'; el.style.opacity = '0'; }
  }

  function showElement(elementId, displayType) {
    const el = document.getElementById(elementId);
    if (el) {
      el.style.display = displayType || 'flex';
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.8s ease';
      setTimeout(function() { el.style.opacity = '1'; }, 50);
    }
  }

  // ============ SOUND ============
  
  let audioCtx = null;
  let soundEnabled = false;

  function initAudio() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) {}
    }
  }

  function playTick() {
    if (!soundEnabled || !audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 600;
      gain.gain.setValueAtTime(0.025, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.04);
    } catch(e) {}
  }

  const soundToggle = document.getElementById('sound-toggle');
  if (soundToggle) {
    soundToggle.addEventListener('click', function() {
      initAudio();
      soundEnabled = !soundEnabled;
      soundToggle.textContent = soundEnabled ? 'sound ●' : 'sound';
      soundToggle.style.opacity = soundEnabled ? '0.7' : '0.3';
    });
  }

  // ============ CURSOR ============
  
  if (window.matchMedia('(pointer: fine)').matches) {
    const cursor = document.getElementById('cursor');
    if (cursor) {
      cursor.style.display = 'block';
      document.addEventListener('mousemove', function(e) {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });
      document.querySelectorAll('button, a, [onclick]').forEach(function(el) {
        el.addEventListener('mouseenter', function() {
          cursor.style.width = '22px';
          cursor.style.height = '22px';
        });
        el.addEventListener('mouseleave', function() {
          cursor.style.width = '12px';
          cursor.style.height = '12px';
        });
      });
    }
  }

  // ============ HESITATION TIMER ============
  
  let hesitationTimer = null;
  let hesitationActive = false;

  function startHesitationTimer() {
    clearTimeout(hesitationTimer);
    hesitationTimer = setTimeout(runHesitationSequence, 8000);
  }

  function cancelHesitationTimer() {
    clearTimeout(hesitationTimer);
    hesitationTimer = null;
    if (hesitationActive) {
      hesitationActive = false;
      hideElement('hesitation-overlay');
    }
  }

  function runHesitationSequence() {
    hesitationActive = true;
    const overlay = document.getElementById('hesitation-overlay');
    if (!overlay) return;
    
    document.querySelectorAll('#step2 button, #step3 button').forEach(function(b) {
      b.style.opacity = '0';
      b.style.pointerEvents = 'none';
    });

    overlay.style.display = 'flex';
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.8s ease';
    setTimeout(function() { overlay.style.opacity = '1'; }, 50);

    const textEl = document.getElementById('hesitation-text');
    const lines = [
      "You're still thinking.",
      "That's already an answer.",
      "The ones who belong here don't hesitate.",
      "Access is closing."
    ];
    const delays = [0, 2500, 5000, 7500];

    lines.forEach(function(line, i) {
      setTimeout(function() {
        if (!hesitationActive) return;
        if (textEl) textEl.textContent = line;
      }, delays[i]);
    });

    setTimeout(function() {
      if (!hesitationActive) return;
      let count = 5;
      if (textEl) textEl.textContent = count;
      if (textEl) textEl.style.fontSize = '4rem';
      if (textEl) textEl.style.color = '#c9a84c';
      
      const countInterval = setInterval(function() {
        if (!hesitationActive) { clearInterval(countInterval); return; }
        count--;
        if (count > 0) {
          if (textEl) textEl.textContent = count;
        } else {
          clearInterval(countInterval);
          if (textEl) textEl.textContent = 'Access closed.';
          if (textEl) textEl.style.fontSize = '0.9rem';
          if (textEl) textEl.style.color = 'white';
          setTimeout(function() {
            if (hesitationActive) {
              localStorage.setItem('imani_visited', 'true');
              window.location.href = '/closed.html';
            }
          }, 1500);
        }
      }, 1000);
    }, 10000);
  }

  // ============ RETURN COUNTDOWN ============
  
  let returnInterval = null;

  function startReturnCountdown() {
    const timerEl = document.getElementById('return-timer');
    if (!timerEl) return;
    timerEl.style.display = 'block';
    let seconds = 30;
    timerEl.textContent = '0:30';
    
    returnInterval = setInterval(function() {
      seconds--;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      timerEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
      if (seconds <= 0) {
        clearInterval(returnInterval);
        window.location.href = '/closed.html';
      }
    }, 1000);
  }

  // ============ REJECTION SCREEN ============
  
  function showRejection(message) {
    cancelHesitationTimer();
    hideElement('step2');
    hideElement('step3');
    
    const rejEl = document.getElementById('rejection');
    const textEl = document.getElementById('rejection-text');
    if (!rejEl) return;
    
    rejEl.style.display = 'flex';
    rejEl.style.opacity = '0';
    rejEl.style.transition = 'opacity 0.8s ease';
    setTimeout(function() { rejEl.style.opacity = '1'; }, 50);
    
    if (textEl) {
      textEl.textContent = '';
      typeText('rejection-text', message, 40, function() {
        setTimeout(function() {
          const sub = document.getElementById('rejection-sub');
          if (sub) {
            sub.style.opacity = '0';
            sub.style.visibility = 'visible';
            sub.style.transition = 'opacity 0.8s ease';
            setTimeout(function() { sub.style.opacity = '1'; }, 50);
          }
          setTimeout(function() {
            const retry = document.getElementById('rejection-retry');
            if (retry) {
              retry.style.opacity = '0';
              retry.style.visibility = 'visible';
              retry.style.transition = 'opacity 0.8s ease';
              setTimeout(function() { retry.style.opacity = '1'; }, 50);
            }
          }, 1500);
        }, 1000);
      });
    }
  }

  // ============ FINAL SCREEN ============
  
  function showFinal() {
    cancelHesitationTimer();
    if (returnInterval) clearInterval(returnInterval);
    
    sessionStorage.setItem('imani_access', 'granted');
    
    hideElement('step3');
    const finalEl = document.getElementById('final');
    if (!finalEl) return;
    
    finalEl.style.display = 'flex';
    finalEl.style.opacity = '0';
    finalEl.style.transition = 'opacity 0.8s ease';
    setTimeout(function() { finalEl.style.opacity = '1'; }, 50);
    
    typeText('final-text1', 'You have access.', 50, function() {
      setTimeout(function() {
        fadeIn('final-text2', 0, function() {
          const links = ['final-link1', 'final-link2', 'final-link3'];
          links.forEach(function(id, i) {
            fadeIn(id, i * 600);
          });
        });
      }, 1000);
    });
  }

  // ============ STEP 2 ============
  
  function showStep2() {
    hideElement('step1');
    const step2 = document.getElementById('step2');
    if (!step2) return;
    step2.style.display = 'flex';
    step2.style.opacity = '0';
    step2.style.transition = 'opacity 0.8s ease';
    setTimeout(function() { step2.style.opacity = '1'; }, 50);
    
    typeText('step2-question', 'Why are you here?', 50, function() {
      setTimeout(function() {
        fadeIn('step2-btn1', 0);
        fadeIn('step2-btn2', 400);
        fadeIn('step2-btn3', 800);
        setTimeout(startHesitationTimer, 1200);
      }, 500);
    });
  }

  // ============ STEP 3 ============
  
  function showStep3() {
    hideElement('step2');
    const step3 = document.getElementById('step3');
    if (!step3) return;
    step3.style.display = 'flex';
    step3.style.opacity = '0';
    step3.style.transition = 'opacity 0.8s ease';
    setTimeout(function() { step3.style.opacity = '1'; }, 50);
    
    typeText('step3-question', 'What are you willing to offer?', 50, function() {
      setTimeout(function() {
        fadeIn('step3-btn1', 0);
        fadeIn('step3-btn2', 400);
        fadeIn('step3-btn3', 800);
        setTimeout(startHesitationTimer, 1200);
      }, 500);
    });
  }

  // ============ STEP 1 ============
  
  function startExperience() {
    typeText('step1-text1', 'Access is not a right.', 50, function() {
      setTimeout(function() {
        typeText('step1-text2', "It's a response.", 50, function() {
          setTimeout(function() {
            const btn = document.getElementById('step1-btn');
            if (btn) {
              btn.style.visibility = 'visible';
              btn.style.opacity = '0';
              btn.style.transition = 'opacity 0.8s ease';
              setTimeout(function() { btn.style.opacity = '1'; }, 50);
            }
          }, 1200);
        });
      }, 800);
    });
  }

  // ============ BUTTON HANDLERS ============
  
  const step1Btn = document.getElementById('step1-btn');
  if (step1Btn) {
    step1Btn.addEventListener('click', function() {
      initAudio();
      showStep2();
    });
  }

  const step2Btn1 = document.getElementById('step2-btn1');
  if (step2Btn1) {
    step2Btn1.addEventListener('click', function() {
      cancelHesitationTimer();
      step2Btn1.style.boxShadow = '0 0 20px rgba(201,168,76,0.6)';
      step2Btn1.style.borderColor = '#c9a84c';
      setTimeout(showStep3, 400);
    });
  }

  const step2Btn2 = document.getElementById('step2-btn2');
  if (step2Btn2) {
    step2Btn2.addEventListener('click', function() {
      cancelHesitationTimer();
      showRejection("Then you're not ready.");
    });
  }

  const step2Btn3 = document.getElementById('step2-btn3');
  if (step2Btn3) {
    step2Btn3.addEventListener('click', function() {
      cancelHesitationTimer();
      showRejection("Then you're not ready.");
    });
  }

  const step3Btn1 = document.getElementById('step3-btn1');
  if (step3Btn1) {
    step3Btn1.addEventListener('click', function() {
      cancelHesitationTimer();
      showRejection('Not enough.');
    });
  }

  const step3Btn2 = document.getElementById('step3-btn2');
  if (step3Btn2) {
    step3Btn2.addEventListener('click', function() {
      cancelHesitationTimer();
      showRejection('Not enough.');
    });
  }

  const step3Btn3 = document.getElementById('step3-btn3');
  if (step3Btn3) {
    step3Btn3.addEventListener('click', function() {
      cancelHesitationTimer();
      step3Btn3.style.boxShadow = '0 0 20px rgba(201,168,76,0.6)';
      step3Btn3.style.borderColor = '#c9a84c';
      setTimeout(showFinal, 400);
    });
  }

  const retryBtn = document.getElementById('rejection-retry');
  if (retryBtn) {
    retryBtn.addEventListener('click', function() {
      sessionStorage.removeItem('imani_access');
      window.location.reload();
    });
  }

  const fanvueLink = document.getElementById('final-link3');
  if (fanvueLink) {
    fanvueLink.addEventListener('click', function() {
      window.va && window.va('event', { name: 'fanvue_clicked' });
    });
  }

  // ============ INIT ============
  
  document.getElementById('bg').classList.add('loaded');
  
  if (sessionStorage.getItem('imani_access') === 'granted') {
    hideElement('step1');
    showFinal();
    return;
  }

  const isReturning = localStorage.getItem('imani_visited') === 'true';
  
  setTimeout(function() {
    startExperience();
    if (isReturning) {
      startReturnCountdown();
    }
  }, 1500);

  history.pushState(null, null, window.location.href);
  window.addEventListener('popstate', function() {
    history.pushState(null, null, window.location.href);
  });

  let exitTriggered = false;
  document.addEventListener('mouseleave', function(e) {
    if (e.clientY < 0 && !exitTriggered) {
      exitTriggered = true;
      const exitEl = document.getElementById('exit-overlay');
      if (exitEl) {
        exitEl.style.display = 'flex';
        setTimeout(function() { exitEl.style.display = 'none'; }, 4000);
      }
    }
  });

});
</script>
</body>
</html>
