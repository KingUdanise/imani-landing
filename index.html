<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imani Sterling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --text: white;
            --hover: #888;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        .step {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .step.active {
            opacity: 1;
            pointer-events: auto;
        }

        .fade-out {
            opacity: 0;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-align: center;
            letter-spacing: 0.05em;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        .question {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-align: center;
            letter-spacing: 0.05em;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        .response-text {
            font-size: clamp(1.5rem, 4vw, 2rem);
            text-align: center;
            letter-spacing: 0.05em;
        }

        .access-text {
            font-size: clamp(1.5rem, 4vw, 2rem);
            text-align: center;
            letter-spacing: 0.05em;
            margin-bottom: 3rem;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .access-text.visible {
            opacity: 1;
        }

        .links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .links a {
            color: var(--text);
            text-decoration: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.25rem, 4vw, 1.75rem);
            letter-spacing: 0.2em;
            opacity: 0;
            transition: opacity 1.5s ease, color 0.3s ease;
        }

        .links a.visible {
            opacity: 1;
        }

        .links a:hover {
            color: var(--hover);
        }

        button {
            background: transparent;
            border: 1px solid var(--text);
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1rem, 3vw, 1.25rem);
            font-weight: 300;
            padding: 1rem 2rem;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }

        button:hover {
            background: var(--text);
            color: var(--bg);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        @media (min-width: 480px) {
            .options {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div id="step1" class="step active">
        <h1>Access is not a right.<br>It's a response.</h1>
        <button onclick="nextStep(1)">Continue</button>
    </div>

    <div id="step2" class="step">
        <p class="question">Why are you here?</p>
        <div class="options">
            <button onclick="selectOption(1, 1)">I recognize value when I see it.</button>
            <button onclick="selectOption(2, 1)">I need to understand first.</button>
            <button onclick="selectOption(3, 1)">I'm just curious.</button>
        </div>
    </div>

    <div id="step2-end" class="step">
        <p class="response-text">Then you're not ready.</p>
    </div>

    <div id="step3" class="step">
        <p class="question">What are you willing to offer?</p>
        <div class="options">
            <button onclick="selectOption(1, 3)">My attention.</button>
            <button onclick="selectOption(2, 3)">My time.</button>
            <button onclick="selectOption(3, 3)">My resources.</button>
        </div>
    </div>

    <div id="step3-end" class="step">
        <p class="response-text">Not enough.</p>
    </div>

    <div id="step-final" class="step">
        <p id="access-text" class="access-text">You have access.</p>
        <div class="links">
            <a href="https://instagram.com/this.imani" target="_blank">Instagram</a>
            <a href="https://x.com/this_imani_" target="_blank">X</a>
            <a href="https://www.fanvue.com/this.imani" target="_blank">FanVue</a>
        </div>
    </div>

    <script>
        function fadeOut(element, callback) {
            element.classList.remove('active');
            element.classList.add('fade-out');
            setTimeout(() => {
                element.classList.remove('fade-out');
                if (callback) callback();
            }, 1500);
        }

        function showStep(stepId) {
            const nextStepEl = document.getElementById(stepId);
            nextStepEl.classList.add('active');
        }

        function nextStep(current) {
            const currentEl = document.getElementById('step' + current);
            fadeOut(currentEl, () => showStep('step' + (current + 1)));
        }

        function showAccessLinks() {
            const accessText = document.getElementById('access-text');
            const links = document.querySelectorAll('.links a');

            setTimeout(() => {
                accessText.classList.add('visible');
            }, 100);

            setTimeout(() => {
                links[0].classList.add('visible');
            }, 2000);

            setTimeout(() => {
                links[1].classList.add('visible');
            }, 2500);

            setTimeout(() => {
                links[2].classList.add('visible');
            }, 3000);
        }

        function selectOption(option, step) {
            if (step === 1) {
                if (option === 1) {
                    const currentEl = document.getElementById('step2');
                    fadeOut(currentEl, () => showStep('step3'));
                } else {
                    const currentEl = document.getElementById('step2');
                    fadeOut(currentEl, () => showStep('step2-end'));
                }
            } else if (step === 3) {
                if (option === 3) {
                    const currentEl = document.getElementById('step3');
                    fadeOut(currentEl, () => {
                        showStep('step-final');
                        showAccessLinks();
                    });
                } else {
                    const currentEl = document.getElementById('step3');
                    fadeOut(currentEl, () => showStep('step3-end'));
                }
            }
        }
    </script>
</body>
</html>
