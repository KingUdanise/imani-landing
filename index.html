<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imani Sterling</title>
    <meta property="og:title" content="Access is not a right.">
    <meta property="og:description" content="It's a response.">
    <meta property="og:image" content="https://imani-landing.vercel.app/background.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://imani-landing.vercel.app/background.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text y='.9em' font-size='90' fill='%23c9a84c'>I</text></svg>">
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Z-INDEX HIERARCHY */
        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('./background.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            z-index: 0;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        
        #bg.loaded {
            opacity: 1;
        }
        
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.80);
            z-index: 1;
            pointer-events: none;
        }
        
        .step {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 2rem;
            position: absolute;
            z-index: 10;
        }
        
        .step.active {
            display: flex;
        }
        
        h1, .question {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-align: center;
            letter-spacing: 0.05em;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .sub-text {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-bottom: 1.5rem;
        }
        
        .extra-text {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-top: 1rem;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
            margin-top: 1rem;
        }
        
        .links a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
        }
        
        .links a:hover {
            text-decoration: underline;
            text-decoration-color: #c9a84c;
        }
        
        /* BUTTONS */
        button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            padding: 1rem 2rem;
            letter-spacing: 0.1em;
            width: min(320px, 85vw);
            min-height: 56px;
            display: block;
            margin: 0.8rem auto;
            cursor: pointer;
            pointer-events: auto;
        }
        
        button:hover {
            background: rgba(255,255,255,0.06);
            border-color: white;
        }
        
        /* UI ELEMENTS */
        #sound-toggle {
            position: fixed;
            top: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            cursor: pointer;
            color: #c9a84c;
            opacity: 0.3;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: none;
            border: none;
        }
        
        #cursor {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #c9a84c;
            position: fixed;
            pointer-events: none;
            z-index: 50;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 8px rgba(201,168,76,0.35);
        }
        
        #return-timer {
            position: fixed;
            top: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 0.9rem;
            color: #c9a84c;
            opacity: 0.6;
            letter-spacing: 0.15em;
            pointer-events: none;
        }
        
        #hes-text {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 25;
            text-align: center;
            font-family: 'Cormorant Garamond', Georgia, serif;
            color: white;
            font-size: 1rem;
            letter-spacing: 0.1em;
            pointer-events: none;
        }
        
        #hes-count {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 25;
            text-align: center;
            font-family: 'Cormorant Garamond', Georgia, serif;
            color: #c9a84c;
            font-size: 4rem;
            pointer-events: none;
        }
        
        .try-link {
            color: white;
            opacity: 0.5;
            font-size: 0.78rem;
            cursor: pointer;
            font-family: 'Cormorant Garamond', Georgia, serif;
            letter-spacing: 0.12em;
            background: none;
            border: none;
            margin-top: 1.5rem;
            text-decoration: none;
        }
        
        .try-link:hover { opacity: 0.8; }
        
        @media (max-width: 768px) {
            #bg { background-attachment: scroll; background-position: center top; }
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="overlay"></div>
    <button id="sound-toggle">sound</button>
    <div id="return-timer"></div>
    <div id="cursor"></div>
    <div id="hes-text"></div>
    <div id="hes-count"></div>
    
    <!-- STEP 1 -->
    <div class="step" id="step1" style="display:flex;">
        <h1 id="step1-h1"></h1>
        <button onclick="goStep2()" style="display:none">I'm ready.</button>
    </div>
    
    <!-- STEP 2 -->
    <div class="step" id="step2">
        <p class="question" id="step2-q"></p>
        <button onclick="selectStep2(1)" style="display:none">I recognize value when I see it.</button>
        <button onclick="selectStep2(2)" style="display:none">I need to understand first.</button>
        <button onclick="selectStep2(3)" style="display:none">I'm just curious.</button>
    </div>
    
    <!-- STEP 2 FAIL -->
    <div class="step" id="step2-fail">
        <p class="question" id="step2fail-q"></p>
        <p class="extra-text" id="step2fail-extra"></p>
        <button class="trylink" onclick="tryAgain()">Try again.</button>
    </div>
    
    <!-- STEP 3 -->
    <div class="step" id="step3">
        <p class="question" id="step3-q"></p>
        <button onclick="selectStep3(1)" style="display:none">My attention.</button>
        <button onclick="selectStep3(2)" style="display:none">My time.</button>
        <button onclick="selectStep3(3)" style="display:none">My resources.</button>
    </div>
    
    <!-- STEP 3 FAIL -->
    <div class="step" id="step3-fail">
        <p class="question" id="step3fail-q"></p>
        <p class="extra-text" id="step3fail-extra"></p>
        <button class="trylink" onclick="tryAgain()">Try again.</button>
    </div>
    
    <!-- STEP ACCESS -->
    <div class="step" id="step-access">
        <h1 id="access-h1"></h1>
        <p class="sub-text" id="access-sub" style="display:none">You're one of few.</p>
        <div class="links">
            <a href="https://instagram.com/this.imani" target="_blank" style="display:none">Instagram</a>
            <a href="https://x.com/this_imani_" target="_blank" style="display:none">X</a>
            <a href="https://www.fanvue.com/this.imani" target="_blank" style="display:none">Claim your access →</a>
        </div>
    </div>
    
    <script>
        // SOUND
        var soundOn = false;
        var audioCtx = null;
        
        document.getElementById('sound-toggle').onclick = function() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            soundOn = !soundOn;
            document.getElementById('sound-toggle').textContent = soundOn ? 'sound ●' : 'sound';
        };
        
        function playTick() {
            if (!soundOn || !audioCtx) return;
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 600;
            gain.gain.setValueAtTime(0.025, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        }
        
        // CURSOR
        if (window.matchMedia('(pointer: fine)').matches) {
            var cur = document.getElementById('cursor');
            cur.style.display = 'block';
            document.addEventListener('mousemove', function(e) {
                cur.style.left = e.clientX + 'px';
                cur.style.top = e.clientY + 'px';
            });
        }
        
        // INSTAGRAM BANNER
        if (/Instagram|FBAN|FBAV/.test(navigator.userAgent)) {
            var banner = document.createElement('div');
            banner.textContent = 'For best experience, open in Safari or Chrome';
            banner.style.cssText = 'position:fixed;bottom:0;left:0;width:100%;text-align:center;font-size:0.6rem;color:white;opacity:0.35;padding:0.6rem;z-index:1000;cursor:pointer;font-family:Cormorant Garamond,Georgia,serif;letter-spacing:0.1em;';
            banner.onclick = function() { banner.style.display = 'none'; };
            document.body.appendChild(banner);
        }
        
        // HESITATION TIMER
        var hesTimer = null;
        
        function startHesTimer() {
            clearHesTimer();
            hesTimer = setTimeout(runHesSequence, 8000);
        }
        
        function clearHesTimer() {
            if (hesTimer) { clearTimeout(hesTimer); hesTimer = null; }
        }
        
        function runHesSequence() {
            var activeStep = document.querySelector('.step[style*="flex"], .step.active');
            if (!activeStep) return;
            var buttons = activeStep.querySelectorAll('button:not(.trylink)');
            buttons.forEach(function(b) { b.style.display = 'none'; });
            
            var texts = ["You're still thinking.", "That's already an answer.", "The ones who belong here don't hesitate.", "Access is closing."];
            var hesDiv = document.getElementById('hes-text');
            hesDiv.style.display = 'block';
            
            var i = 0;
            function showNext() {
                if (i < texts.length) {
                    hesDiv.textContent = texts[i];
                    i++;
                    setTimeout(showNext, 2000);
                } else {
                    var count = 5;
                    var countEl = document.getElementById('hes-count');
                    countEl.style.display = 'block';
                    var countInterval = setInterval(function() {
                        countEl.textContent = count;
                        count--;
                        if (count < 0) {
                            clearInterval(countInterval);
                            countEl.style.display = 'none';
                            hesDiv.textContent = 'Access closed.';
                            setTimeout(function() {
                                localStorage.setItem('imani_visited', 'true');
                                window.location.href = '/closed.html';
                            }, 1500);
                        }
                    }, 1000);
                }
            }
            showNext();
        }
        
        // RETURNING VISITOR TIMER
        var returnTimer = null;
        
        function startReturnTimer() {
            var seconds = 30;
            var timerEl = document.getElementById('return-timer');
            timerEl.textContent = '0:30';
            timerEl.style.display = 'block';
            returnTimer = setInterval(function() {
                seconds--;
                var secs = seconds % 60;
                timerEl.textContent = '0:' + (secs < 10 ? '0' : '') + secs;
                if (seconds <= 0) {
                    clearInterval(returnTimer);
                    window.location.href = '/closed.html';
                }
            }, 1000);
        }
        
        function stopReturnTimer() {
            if (returnTimer) { clearInterval(returnTimer); returnTimer = null; }
            document.getElementById('return-timer').style.display = 'none';
        }
        
        // TYPEWRITER
        function typeText(element, text, speed, callback) {
            element.textContent = '';
            var i = 0;
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    playTick();
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    setTimeout(callback, speed);
                }
            }
            type();
        }
        
        // SHOW STEP
        function showStep(stepId) {
            document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); s.style.display = 'none'; });
            document.getElementById(stepId).style.display = 'flex';
            document.getElementById(stepId).classList.add('active');
        }
        
        // TRY AGAIN
        function tryAgain() {
            sessionStorage.removeItem('imani_access');
            window.location.reload();
        }
        
        // STEP NAVIGATION
        function goStep2() {
            clearHesTimer();
            showStep('step2');
            typeText(document.getElementById('step2-q'), "Why are you here?", 50, function() {
                var btns = document.querySelectorAll('#step2 button');
                btns[0].style.display = 'block';
                setTimeout(function() { btns[1].style.display = 'block'; }, 400);
                setTimeout(function() { btns[2].style.display = 'block'; }, 800);
                setTimeout(startHesTimer, 1500);
            });
        }
        
        function selectStep2(opt) {
            clearHesTimer();
            if (opt === 1) {
                showStep('step3');
                typeText(document.getElementById('step3-q'), "What are you willing to offer?", 50, function() {
                    var btns = document.querySelectorAll('#step3 button');
                    btns[0].style.display = 'block';
                    setTimeout(function() { btns[1].style.display = 'block'; }, 400);
                    setTimeout(function() { btns[2].style.display = 'block'; }, 800);
                    setTimeout(startHesTimer, 1500);
                });
            } else {
                showStep('step2-fail');
                typeText(document.getElementById('step2fail-q'), "Then you're not ready.", 50, function() {
                    setTimeout(function() {
                        document.getElementById('step2fail-extra').textContent = 'Access closes in 24 hours.';
                    }, 1500);
                });
            }
        }
        
        function selectStep3(opt) {
            clearHesTimer();
            if (opt === 3) {
                showStep('step-access');
                sessionStorage.setItem('imani_access', 'granted');
                stopReturnTimer();
                document.getElementById('access-sub').style.display = 'block';
                typeText(document.getElementById('access-h1'), "You have access.", 50, function() {
                    setTimeout(function() {
                        var links = document.querySelectorAll('#step-access .links a');
                        links[0].style.display = 'block';
                        setTimeout(function() { links[1].style.display = 'block'; }, 600);
                        setTimeout(function() { links[2].style.display = 'block'; }, 1200);
                    }, 1000);
                });
            } else {
                showStep('step3-fail');
                typeText(document.getElementById('step3fail-q'), "Not enough.", 50, function() {
                    setTimeout(function() {
                        document.getElementById('step3fail-extra').textContent = 'Those who understand value don\'t hesitate.';
                    }, 1500);
                });
            }
        }
        
        // INIT
        function init() {
            document.getElementById('bg').classList.add('loaded');
            
            if (sessionStorage.getItem('imani_access') === 'granted') {
                showStep('step-access');
                document.getElementById('access-h1').textContent = 'You have access.';
                var links = document.querySelectorAll('#step-access .links a');
                links[0].style.display = 'block';
                links[1].style.display = 'block';
                links[2].style.display = 'block';
                return;
            }
            
            if (localStorage.getItem('imani_visited')) {
                startReturnTimer();
            }
            
            typeText(document.getElementById('step1-h1'), "Access is not a right.", 50, function() {
                setTimeout(function() {
                    document.getElementById('step1-h1').innerHTML += '<br>';
                    typeText(document.getElementById('step1-h1'), "It's a response.", 50, function() {
                        setTimeout(function() {
                            document.querySelector('#step1 button').style.display = 'block';
                        }, 1200);
                    });
                }, 800);
            });
        }
        
        setTimeout(init, 500);
    </script>
</body>
</html>
