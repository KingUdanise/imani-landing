<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Closed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Cormorant Garamond', 'Palatino Linotype', Georgia, serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./background.jpg');
            background-size: cover;
            background-position: center 20%;
            background-repeat: no-repeat;
            z-index: -1;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        #bg.loaded { opacity: 1; }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.78);
            z-index: 0;
        }
        .closed-text {
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            opacity: 0.7;
            z-index: 1;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <p class="closed-text">Access is closed.</p>
    <script>
        document.getElementById('bg').onload = function() {
            document.getElementById('bg').classList.add('loaded');
        };
        if (document.getElementById('bg').complete) {
            document.getElementById('bg').classList.add('loaded');
        }
    </script>
</body>
</html>
